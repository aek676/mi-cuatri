name: Main Deploy Orchestrator

on:
  push:
    branches: ["main"]
    paths: ["frontend/**", "backend/**"]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/reusable-build-test.yml

  deploy-frontend:
    needs: build
    if: needs.build.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/reusable-deploy-frontend.yml
    secrets: inherit

  deploy-backend:
    needs: build
    if: needs.build.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/reusable-deploy-backend.yml
    secrets: inherit
